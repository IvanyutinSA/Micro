services:
  postgres-db:
    image: postgres:16
    ports:
      - "8002:5432"
    networks:
      - backend-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

  backend:
    build:
      context: .
    ports:
      - "8001:8000"
    networks:
      - backend-network
    environment:
      POSTGRES_HOST: postgres-db
    # develop: 
    #   watch:
    #     - action: sync
    #       path: ./src
    #       target: /usr/local/app/src
    #       initial_sync: true
    #     - action: sync
    #       path: ./tests
    #       target: /usr/local/app/tests
    #       initial_sync: true
    #     - action: rebuild
    #       path: requirements.txt
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    #   interval: 30s
    #   timeout: 60s
    #   retries: 5
    #   start_period: 40s
    depends_on:
      postgres-db:
        condition: service_healthy

volumes:
  pgdata:

networks:
  backend-network:
    driver: bridge
